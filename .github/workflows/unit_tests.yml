name: unit-tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      - name: Build once
        run: cargo build --release

      - name: Test corekv
        run: cargo test -p corekv --tests --release

      - name: Test keyring
        run: cargo test -p keyring --tests --release